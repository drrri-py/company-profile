{% extends 'base.html' %}

{% block title %}{{ article.title }} - Company Profile{% endblock %}

{% block content %}
<div class="py-10 bg-white">
    <div class="container mx-auto px-6 max-w-4xl">
        <a href="{% url 'articles' %}" class="text-blue-600 font-semibold hover:underline mb-6 inline-block">&larr; Kembali ke Artikel</a>
        
        <h1 class="text-4xl font-bold text-gray-900 mb-4">{{ article.title }}</h1>
        <p class="text-gray-500 mb-8">{{ article.created_at|date:"d F Y H:i" }}</p>
        
        {% if article.main_image %}
        <img src="{{ article.main_image.url }}" alt="{{ article.title }}" class="w-full h-auto rounded-xl shadow-md mb-10 object-cover max-h-96">
        {% endif %}
        
        <div class="prose prose-lg max-w-none text-gray-800">
            {{ article.content|safe }}
        </div>
    </div>
</div>
{% endblock %}
