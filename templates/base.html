<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Company Profile{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-gray-50 text-gray-800">

    <!-- Header Navigation -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-2xl font-bold text-blue-600">CorpName</a>
            <nav class="hidden md:flex space-x-6">
                <a href="{% url 'home' %}" class="text-gray-600 hover:text-blue-600 transition">Home</a>
                <a href="{% url 'profile' %}" class="text-gray-600 hover:text-blue-600 transition">Profil</a>
                <a href="{% url 'products' %}" class="text-gray-600 hover:text-blue-600 transition">Produk</a>
                <a href="{% url 'articles' %}" class="text-gray-600 hover:text-blue-600 transition">Artikel</a>
                <a href="{% url 'gallery' %}" class="text-gray-600 hover:text-blue-600 transition">Galeri</a>
                <a href="{% url 'contact' %}" class="text-gray-600 hover:text-blue-600 transition">Kontak</a>
            </nav>
            <!-- Mobile Menu Button -->
            <button class="md:hidden text-gray-600 hover:text-blue-600 focus:outline-none">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-10 mt-12">
        <div class="container mx-auto px-6 text-center">
            <p class="text-gray-400 mb-4">&copy; {% now "Y" %} CorpName. All rights reserved.</p>
            <div class="flex justify-center space-x-4">
                <a href="#" class="text-gray-400 hover:text-white transition">Privacy Policy</a>
                <a href="#" class="text-gray-400 hover:text-white transition">Terms of Service</a>
            </div>
            {% if profile.email %}
            <p class="mt-4 text-sm text-gray-500">Email: {{ profile.email }} | Telp: {{ profile.phone }}</p>
            {% endif %}
        </div>
    </footer>

</body>
</html>
