{% extends 'base.html' %}

{% block title %}Galeri - Company Profile{% endblock %}

{% block content %}
<div class="py-10 bg-gray-50">
    <div class="container mx-auto px-6">
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-10">Galeri Perusahaan</h1>
        
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            {% for gallery in galleries %}
            <div class="group relative overflow-hidden rounded-lg shadow-md cursor-pointer">
                {% if gallery.image %}
                <img src="{{ gallery.image.url }}" alt="{{ gallery.title }}" class="w-full h-64 object-cover transform group-hover:scale-110 transition duration-500">
                <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
                    <p class="text-white text-lg font-bold text-center px-4">{{ gallery.title }}</p>
                </div>
                {% else %}
                <div class="w-full h-64 bg-gray-200 flex items-center justify-center text-gray-500">No Image</div>
                {% endif %}
            </div>
            {% empty %}
            <p class="text-center col-span-full text-gray-500">Belum ada foto di galeri.</p>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
